<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smile Creator あい | Official Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #fcfaf7; color: #1a202c; -webkit-tap-highlight-color: transparent; }
        .font-tsukushi { font-family: 'Shippori Mincho', serif; font-weight: 700; letter-spacing: 0.05em; }
        
        .menu-item {
            background: white;
            border: 1px solid #f3f4f6;
            border-radius: 24px;
            padding: 20px 24px;
            margin-bottom: 16px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .menu-item:active { transform: scale(0.96); background-color: #fffafb; }

        .icon-circle {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .detail-view {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 100;
            display: none;
            overflow-y: auto;
            padding: 40px 24px;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .btn-line {
            background-color: #06C755;
            color: white;
            padding: 18px;
            border-radius: 99px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(6, 199, 85, 0.2);
            transition: opacity 0.2s;
            cursor: pointer;
        }
        .btn-line:active { opacity: 0.8; }

        .video-box {
            background: linear-gradient(135deg, #1a202c 0%, #3d4654 100%);
            border-radius: 24px;
            padding: 24px;
            color: white;
            text-align: center;
            margin-bottom: 40px;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            position: relative;
            overflow: hidden;
        }
        .video-box:active { transform: scale(0.98); }

        .check-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #4a5568;
            line-height: 1.6;
        }
        .check-icon {
            width: 20px;
            height: 20px;
            background-color: #fff;
            border: 1.5px solid #fbcfe8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .fade-in {
            animation: fadeIn 1s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="max-w-md mx-auto min-h-screen pb-20">
        
        <!-- Header -->
        <header class="pt-20 pb-12 px-8 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-40 bg-gradient-to-b from-pink-50/50 to-transparent -z-10"></div>
            
            <p class="text-[11px] text-pink-300 tracking-[0.3em] font-medium mb-3 fade-in">
                あなたの想いをカタチに。
            </p>

            <h1 class="text-[22px] font-tsukushi leading-relaxed fade-in" style="animation-delay: 0.2s;">
                Smile Creator あい<br>
                <span class="text-[9px] text-slate-400 font-normal tracking-[0.5em] uppercase mt-2 block">Design & Branding Menu</span>
            </h1>
        </header>

        <!-- PORTFOLIO VIDEO -->
        <div class="px-6 mb-12 fade-in" style="animation-delay: 0.4s;">
            <div onclick="window.location.href='https://vimeo.com/1178187294?share=copy&fl=sv&fe=ci'" class="video-box">
                <div class="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-white/20">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
                </div>
                <p class="text-sm font-bold tracking-[0.2em] mb-1">Portfolio Movie</p>
                <p class="text-[10px] text-slate-300">制作実績・想いを動画で見る</p>
            </div>
        </div>

        <!-- MAIN MENU LIST -->
        <div class="px-6 space-y-4 fade-in" style="animation-delay: 0.6s;">
            <div class="menu-item" onclick="show('startpack')">
                <div class="icon-circle bg-yellow-50 text-yellow-500">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-7.714 2.143L11 21l-2.286-6.857L1 12l7.714-2.143L11 3z"></path></svg>
                </div>
                <div class="flex-grow">
                    <span class="text-lg font-tsukushi text-slate-800">起業スタートパック</span>
                </div>
                <span class="text-slate-300">→</span>
            </div>

            <div class="menu-item" onclick="show('litlink')">
                <div class="icon-circle bg-pink-50 text-pink-400">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                </div>
                <div class="flex-grow">
                    <span class="text-lg font-tsukushi text-slate-800">lit.link 制作</span>
                </div>
                <span class="text-slate-300">→</span>
            </div>

            <div class="menu-item" onclick="show('richmenu')">
                <div class="icon-circle bg-blue-50 text-blue-400">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </div>
                <div class="flex-grow">
                    <span class="text-lg font-tsukushi text-slate-800">リッチメニュー制作</span>
                </div>
                <span class="text-slate-300">→</span>
            </div>

            <div class="menu-item" onclick="show('leaflet')">
                <div class="icon-circle bg-orange-50 text-orange-400">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <div class="flex-grow">
                    <span class="text-lg font-tsukushi text-slate-800">チラシ・メニュー作成</span>
                </div>
                <span class="text-slate-300">→</span>
            </div>

            <div class="menu-item" onclick="show('businesscard')">
                <div class="icon-circle bg-emerald-50 text-emerald-400">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                </div>
                <div class="flex-grow">
                    <span class="text-lg font-tsukushi text-slate-800">名刺・カード制作</span>
                </div>
                <span class="text-slate-300">→</span>
            </div>

            <div class="menu-item" onclick="show('snsdesign')">
                <div class="icon-circle bg-purple-50 text-purple-400">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <div class="flex-grow">
                    <span class="text-lg font-tsukushi text-slate-800">資料・SNSデザイン</span>
                </div>
                <span class="text-slate-300">→</span>
            </div>
        </div>

        <footer class="mt-24 px-8 pb-16 text-center opacity-40">
            <p class="text-[10px] text-slate-400 font-tsukushi tracking-[0.4em] uppercase">Smile Creator Ai</p>
        </footer>
    </div>

    <!-- DETAIL OVERLAY -->
    <div id="overlay" class="detail-view">
        <div class="max-w-md mx-auto">
            <button onclick="hide()" class="mb-10 text-slate-400 text-sm flex items-center gap-2">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                メニューに戻る
            </button>
            
            <div id="content"></div>

            <div class="mt-16">
                <div id="line-button-container"></div>
            </div>
        </div>
    </div>

    <script>
        const details = {
            startpack: {
                title: '起業スタートパック',
                msg: '起業スタートパックについて詳しく教えてください！',
                checks: ['名刺デザイン制作', 'lit.link制作', 'リッチメニュー制作', 'SNSアイコン作成']
            },
            litlink: {
                title: 'lit.link 制作',
                msg: 'リットリンク（lit.link）の制作をお願いしたいです。',
                checks: ['世界観を伝えるデザイン', '導線設計', 'LP風レイアウト', 'アイコン制作込み']
            },
            richmenu: {
                title: 'リッチメニュー制作',
                msg: 'リッチメニューの制作を相談したいです。',
                checks: ['高クリック率の配置', 'ブランドカラー対応', '設置サポート込み']
            },
            leaflet: {
                title: 'チラシ・メニュー作成',
                msg: 'チラシやメニュー表の作成について相談させてください。',
                checks: ['店舗に合わせたデザイン', '読みやすさ重視', 'QRコード設置']
            },
            businesscard: {
                title: '名刺・カード制作',
                msg: '名刺の制作をお願いしたいです。',
                checks: ['印象に残るオリジナルデザイン', '印刷入稿代行', 'ショップカード対応']
            },
            snsdesign: {
                title: '資料・SNSデザイン',
                msg: 'SNS投稿画像や資料のデザインをお願いしたいです。',
                checks: ['インスタ投稿・バナー', 'プレゼン資料ブラッシュアップ', 'YouTubeサムネ']
            }
        };

        function show(id) {
            const d = details[id];
            let checkListHtml = d.checks.map(item => `
                <div class="check-item">
                    <div class="check-icon">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fbcfe8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <span>${item}</span>
                </div>
            `).join('');

            document.getElementById('content').innerHTML = `
                <h2 class="text-[26px] font-tsukushi text-slate-900 mb-2">${d.title}</h2>
                <div class="w-10 h-1 bg-pink-100 mb-10"></div>
                
                <div class="bg-[#fffafa] rounded-[32px] p-8 border border-pink-50 shadow-sm">
                    <p class="text-[11px] font-bold text-pink-300 tracking-widest uppercase mb-6">Service Features</p>
                    <div class="space-y-2">
                        ${checkListHtml}
                    </div>
                </div>
            `;

            // lin.ee を直接叩くのが最も安全です（友だち追加設定が生きていれば確実）
            // メッセージ付きで送る場合は、お客様に「送信ボタン」を押してもらう必要があります
            const baseUrl = "https://lin.ee/r4Jie7q";
            
            document.getElementById('line-button-container').innerHTML = `
                <div onclick="openLine('${d.msg}')" class="btn-line">
                    公式LINEで相談する
                </div>
            `;

            document.getElementById('overlay').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function openLine(text) {
            // 公式LINEの短縮URLへ飛ばします
            // メッセージを自動入力させたい場合、公式アカウント側の設定によっては
            // 特定のリンク形式が弾かれることがあるため、まずは一番確実な短縮URLへ遷移させます。
            window.location.href = "https://lin.ee/r4Jie7q";
        }

        function hide() {
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
